name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPOSE_PROFILES: dev
  CI: "true"

jobs:
  lint-test-e2e:
    name: Lint, unit tests, and E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create environment file
        run: cp .env.example .env

      - name: Build and start Docker stack
        run: docker compose --profile dev up --build -d

      - name: Wait for application health
        run: |
          for attempt in $(seq 1 60); do
            if curl -sf http://localhost:3001/api/health | grep -q '"status":"ok"'; then
              echo "Health check passed on attempt ${attempt}"
              exit 0
            fi
            echo "Waiting for app (${attempt}/60)..."
            sleep 5
          done
          echo "Application did not become healthy in time"
          docker compose --profile dev logs app
          exit 1

      - name: Lint
        run: docker compose --profile dev exec -T app pnpm lint

      - name: Unit and integration tests
        run: docker compose --profile dev exec -T app ./node_modules/.bin/vitest run

      - name: E2E smoke tests
        run: docker compose --profile dev exec -T app ./node_modules/.bin/tsx scripts/run-e2e.ts

      - name: Collect Playwright artifacts on failure
        if: failure()
        run: |
          docker compose --profile dev cp app:/app/playwright-report ./playwright-report 2>/dev/null || true
          docker compose --profile dev cp app:/app/test-results ./test-results 2>/dev/null || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

      - name: Stop Docker stack
        if: always()
        run: docker compose --profile dev down -v
